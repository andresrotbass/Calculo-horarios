      --sans: 'DM Sans', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 32px 16px 64px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 32px;
    }
    .header-icon {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .header-icon svg { width: 22px; height: 22px; }
    .header h1 {
      font-size: clamp(1.3rem, 4vw, 1.75rem);
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1.2;
    }
    .header p {
      margin-top: 4px;
      font-size: 0.875rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* Grid */
    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr;
    }
    @media (min-width: 700px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }

    /* Card */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
    }
    .card-header {
      padding: 20px 20px 0;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card-title svg { width: 15px; height: 15px; color: var(--text-secondary); }
    .card-body {
      padding: 16px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Form elements */
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
      letter-spacing: 0.01em;
    }
    input[type="datetime-local"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--input-bg);
      font-family: var(--mono);
      font-size: 0.875rem;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="datetime-local"]:focus {
      border-color: var(--accent);
    }

    .info-box {
      background: var(--tag-bg);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .info-box strong { color: var(--text-primary); }

    textarea {
      width: 100%;
      height: 220px;
      resize: none;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--input-bg);
      padding: 12px 14px;
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text-primary);
      outline: none;
      line-height: 1.6;
    }

    .btn-copy {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      border-radius: 12px;
      padding: 11px;
      font-family: var(--sans);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-copy:hover { opacity: 0.88; }
    .btn-copy:active { transform: scale(0.98); }
    .btn-copy svg { width: 15px; height: 15px; }

    /* Tags */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag {
      border: none;
      border-radius: 999px;
      padding: 5px 12px;
      font-family: var(--sans);
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      background: var(--tag-bg);
      color: var(--text-secondary);
      outline: 1px solid var(--border);
    }
    .tag.active {
      background: var(--tag-active-bg);
      color: var(--tag-active-fg);
      outline: none;
    }
    .tag:hover:not(.active) { background: #dedad4; }

    /* Results list */
    .results {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .result-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 16px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }
    .result-index {
      font-size: 0.7rem;
      color: var(--text-secondary);
      font-family: var(--mono);
    }
    .result-label {
      font-size: 0.9rem;
      font-weight: 500;
    }
    .result-time {
      font-family: var(--mono);
      font-size: 0.9rem;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
        <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>
      </svg>
    </div>
    <div>
      <h1>Horarios locales por país</h1>
      <p>La hora de referencia es siempre New York. Ingresás fecha y hora de NYC y la app calcula el resto.</p>
    </div>
  </div>

  <div class="grid">

    <!-- Columna izquierda -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">Hora de referencia</div>
      </div>
      <div class="card-body">
        <div>
          <label for="datetime">Fecha y hora de New York</label>
          <input type="datetime-local" id="datetime" />
        </div>

        <div class="info-box">
          Esta fecha y hora corresponde a <strong>New York</strong>.
        </div>

        <div>
          <label for="whatsapp-text">Texto copiable para WhatsApp</label>
          <textarea id="whatsapp-text" readonly></textarea>
          <br/>
          <button class="btn-copy" id="btn-copy" onclick="handleCopy()">
            <svg id="copy-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            <span id="copy-label">Copiar</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Columna derecha -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
            <path d="M7 16V4m0 0L3 8m4-4 4 4M17 8v12m0 0 4-4m-4 4-4-4"/>
          </svg>
          Países para incluir
        </div>
      </div>
      <div class="card-body">
        <div class="tags" id="tags-container"></div>
        <div class="results" id="results-container"></div>
      </div>
    </div>

  </div>
</div>

<script>
const PLACES = [
  { label: "New York",           timeZone: "America/New_York" },
  { label: "Chile",              timeZone: "America/Santiago" },
  { label: "México",             timeZone: "America/Mexico_City" },
  { label: "Argentina",          timeZone: "America/Argentina/Buenos_Aires" },
  { label: "Uruguay",            timeZone: "America/Montevideo" },
  { label: "Colombia",           timeZone: "America/Bogota" },
  { label: "Perú",               timeZone: "America/Lima" },
  { label: "Ecuador",            timeZone: "America/Guayaquil" },
  { label: "Costa Rica",         timeZone: "America/Costa_Rica" },
  { label: "Brasil (São Paulo)", timeZone: "America/Sao_Paulo" },
  { label: "Bolivia",            timeZone: "America/La_Paz" },
  { label: "Paraguay",           timeZone: "America/Asuncion" },
  { label: "Venezuela",          timeZone: "America/Caracas" },
  { label: "Panamá",             timeZone: "America/Panama" },
  { label: "Guatemala",          timeZone: "America/Guatemala" },
  { label: "El Salvador",        timeZone: "America/El_Salvador" },
  { label: "Rep. Dominicana",    timeZone: "America/Santo_Domingo" },
  { label: "Inglaterra",         timeZone: "Europe/London" },
  { label: "España",             timeZone: "Europe/Madrid" },
];

const DEFAULT_SELECTED = [
  "Costa Rica","México","Colombia","Ecuador","Perú",
  "Chile","Argentina","Uruguay","Brasil (São Paulo)","Inglaterra","España"
];

const SOURCE_TZ = "America/New_York";

let selectedLabels = [...DEFAULT_SELECTED];

// ── Helpers ──────────────────────────────────────────────────────────────────

function getNowInTZ(tz) {
  const now = new Date();
  const parts = new Intl.DateTimeFormat("en-CA", {
    timeZone: tz, year:"numeric", month:"2-digit", day:"2-digit",
    hour:"2-digit", minute:"2-digit", hour12: false
  }).formatToParts(now);
  const m = Object.fromEntries(parts.map(p => [p.type, p.value]));
  const h = m.hour === "24" ? "00" : m.hour;
  return `${m.year}-${m.month}-${m.day}T${h}:${m.minute}`;
}

function formatPartsInZone(date, tz) {
  const parts = new Intl.DateTimeFormat("en-CA", {
    timeZone: tz, year:"numeric", month:"2-digit", day:"2-digit",
    hour:"2-digit", minute:"2-digit", hour12: false
  }).formatToParts(date);
  const m = Object.fromEntries(parts.map(p => [p.type, p.value]));
  return {
    year: Number(m.year), month: Number(m.month), day: Number(m.day),
    hour: m.hour === "24" ? 0 : Number(m.hour), minute: Number(m.minute)
  };
}

function getTZOffsetMinutes(date, tz) {
  const z = formatPartsInZone(date, tz);
  const utcTs = Date.UTC(z.year, z.month - 1, z.day, z.hour, z.minute);
  return (utcTs - date.getTime()) / 60000;
}

function zonedToUtc(dtLocal, tz) {
  const [datePart, timePart] = dtLocal.split("T");
  if (!datePart || !timePart) return null;
  const [yr, mo, dy] = datePart.split("-").map(Number);
  const [hr, mn] = timePart.split(":").map(Number);
  const guess = new Date(Date.UTC(yr, mo - 1, dy, hr, mn));
  const offset = getTZOffsetMinutes(guess, tz);
  return new Date(guess.getTime() - offset * 60000);
}

function formatDisplay(date, tz) {
  return new Intl.DateTimeFormat("es-AR", {
    timeZone: tz, hour:"2-digit", minute:"2-digit", hour12: false
  }).format(date);
}

function getSortKey(date, tz) {
  const { hour, minute } = formatPartsInZone(date, tz);
  return hour * 60 + minute;
}

function buildWhatsAppText(results) {
  return ["*Horarios locales de diferentes países:*", "", ...results.map(r => `* *${r.label}* / ${r.display} h`)].join("\n");
}

// ── Render ────────────────────────────────────────────────────────────────────

function compute() {
  const inputVal = document.getElementById("datetime").value;
  const utcDate = zonedToUtc(inputVal, SOURCE_TZ);
  if (!utcDate) return [];

  let sorted = PLACES.map(p => ({
    ...p,
    display: formatDisplay(utcDate, p.timeZone),
    sortKey: getSortKey(utcDate, p.timeZone),
  })).sort((a, b) => a.sortKey - b.sortKey || a.label.localeCompare(b.label));

  // España siempre al final
  const withoutSpain = sorted.filter(p => p.label !== "España");
  const spain = sorted.find(p => p.label === "España");
  return spain ? [...withoutSpain, spain] : sorted;
}

function render() {
  const ordered = compute();
  const selected = ordered.filter(r => selectedLabels.includes(r.label));

  // Tags
  const tagsEl = document.getElementById("tags-container");
  tagsEl.innerHTML = "";
  ordered.forEach(item => {
    const btn = document.createElement("button");
    btn.className = "tag" + (selectedLabels.includes(item.label) ? " active" : "");
    btn.textContent = item.label;
    btn.onclick = () => {
      if (selectedLabels.includes(item.label)) {
        selectedLabels = selectedLabels.filter(l => l !== item.label);
      } else {
        selectedLabels.push(item.label);
      }
      render();
    };
    tagsEl.appendChild(btn);
  });

  // Results
  const resultsEl = document.getElementById("results-container");
  resultsEl.innerHTML = "";
  selected.forEach((item, i) => {
    const row = document.createElement("div");
    row.className = "result-row";
    row.innerHTML = `
      <div>
        <div class="result-index">#${i + 1}</div>
        <div class="result-label">${item.label}</div>
      </div>
      <div class="result-time">${item.display} h</div>
    `;
    resultsEl.appendChild(row);
  });

  // WhatsApp text
  document.getElementById("whatsapp-text").value = buildWhatsAppText(selected);
}

// ── Copy ──────────────────────────────────────────────────────────────────────

function handleCopy() {
  const text = document.getElementById("whatsapp-text").value;
  const label = document.getElementById("copy-label");
  const icon = document.getElementById("copy-icon");

  const checkSVG = `<path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>`;
  const copySVG = `<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>`;

  const done = () => {
    label.textContent = "Copiado";
    icon.innerHTML = checkSVG;
    setTimeout(() => { label.textContent = "Copiar"; icon.innerHTML = copySVG; }, 1500);
  };

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
  } else {
    fallbackCopy(text, done);
  }
}

function fallbackCopy(text, cb) {
  const ta = document.getElementById("whatsapp-text");
  ta.focus(); ta.select();
  try { document.execCommand("copy"); cb(); } catch {}
}

// ── Init ──────────────────────────────────────────────────────────────────────

document.getElementById("datetime").value = getNowInTZ(SOURCE_TZ);
document.getElementById("datetime").addEventListener("input", render);
render();
</script>
</body>
</html>
